services:
  agc-auth-helper:
    build:
      context: .
      target: runtime
    image: agc-auth-helper:local
    env_file:
      - ${AGC_AUTH_HELPER_ENV_FILE:-.env.docker.local}
    environment:
      PORT: "3000"
    ports:
      - "${AGC_AUTH_HELPER_HOST_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
